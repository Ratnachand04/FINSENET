# FinSentNet Configuration
# ========================

project:
  name: "FinSentNet"
  seed: 42
  device: "cuda"  # "cuda" or "cpu"
  precision: "fp32"  # "fp16" for mixed precision

# ─── Data ────────────────────────────────────────────────────────────
data:
  # Price data
  tickers: ["AAPL", "MSFT", "GOOGL", "AMZN", "META", "NVDA", "TSLA", "JPM", "BAC", "GS"]
  price_window: 30          # lookback window in trading days
  price_features: 15        # OHLCV(5) + RSI, MACD, Signal, BB_upper, BB_lower, BB_mid, ATR, OBV, VWAP, Returns(15)
  start_date: "2010-01-01"
  end_date: "2024-12-31"
  
  # Text data
  max_seq_length: 512
  vocab_size: 50000
  min_word_freq: 5
  
  # Splits (walk-forward)
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  
  # Temporal alignment
  max_news_lag_hours: 24    # news must precede price by at least this many hours
  news_lookback_hours: 72   # aggregate news from past N hours
  
# ─── Text Branch ─────────────────────────────────────────────────────
text_branch:
  embedding_dim: 256
  hidden_dim: 256
  num_layers: 2
  bidirectional: true
  dropout: 0.3
  attention_heads: 8
  output_dim: 256

# ─── Price Branch ────────────────────────────────────────────────────
price_branch:
  # 1D CNN feature extractor
  cnn_channels: [32, 64, 128]
  cnn_kernel_sizes: [3, 3, 3]
  
  # Temporal LSTM
  lstm_hidden: 128
  lstm_layers: 2
  lstm_dropout: 0.2
  
  # Multi-resolution
  resolutions: ["1min", "5min", "1h", "1d"]  # for intraday; daily-only for initial version
  output_dim: 256

# ─── Cross-Modal Attention Fusion ────────────────────────────────────
fusion:
  d_model: 256
  num_heads: 8
  num_layers: 3
  dropout: 0.1
  feedforward_dim: 512

# ─── Dual-Head Output ───────────────────────────────────────────────
dual_head:
  # Direction head
  direction_classes: 3       # Up / Down / Neutral
  neutral_threshold: 0.001   # |return| < threshold → neutral
  
  # Confidence head
  confidence_bins: 5         # discretized confidence levels
  temperature_init: 1.5      # temperature scaling initialization

# ─── GAN Augmentation ───────────────────────────────────────────────
gan:
  generator:
    noise_dim: 128
    hidden_dims: [256, 512, 256]
    output_dim: -1  # auto: price_window * price_features
  
  discriminator:
    hidden_dims: [256, 512, 256]
  
  training:
    n_critic: 5              # WGAN-GP: critic steps per generator step
    lambda_gp: 10.0          # gradient penalty coefficient
    lr_g: 0.0001
    lr_d: 0.0004
    beta1: 0.0
    beta2: 0.9
    epochs: 200
    batch_size: 64
  
  # Regime conditioning
  regimes: ["bull", "bear", "crisis", "high_vol", "low_vol"]

# ─── Training ───────────────────────────────────────────────────────
training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  
  # Optimizer
  optimizer: "adamw"
  scheduler: "cosine_warmup"
  warmup_epochs: 5
  
  # Loss
  focal_loss_gamma: 2.0
  focal_loss_alpha: [0.3, 0.4, 0.3]  # Up, Neutral, Down weights
  direction_loss_weight: 0.7
  confidence_loss_weight: 0.3
  
  # Regularization
  label_smoothing: 0.05
  gradient_clip_norm: 1.0
  
  # Early stopping
  patience: 15
  monitor: "val_sharpe"     # stop on financial metric, not loss
  
  # Class imbalance
  use_class_weights: true
  temporal_stratified_sampling: true

# ─── Backtesting ────────────────────────────────────────────────────
backtest:
  initial_capital: 1000000.0
  commission_bps: 5          # 5 basis points per trade
  slippage_bps: 2            # 2 basis points slippage
  max_position_pct: 0.10     # max 10% in single position
  max_leverage: 1.0          # no leverage initially
  rebalance_freq: "daily"
  
  # Position sizing
  sizing_method: "kelly"     # "kelly", "equal_weight", "volatility_parity"
  kelly_fraction: 0.25       # quarter-Kelly for safety
  
  # Risk limits
  max_drawdown_pct: 0.15     # halt if drawdown > 15%
  daily_var_limit: 0.02      # 2% daily VaR limit
  correlation_limit: 0.7     # max pairwise correlation

# ─── Portfolio Optimization ─────────────────────────────────────────
portfolio:
  method: "mean_variance"    # "mean_variance", "risk_parity", "black_litterman"
  risk_free_rate: 0.05       # annualized
  target_volatility: 0.15    # 15% annualized vol target
  rebalance_window: 21       # trading days
  covariance_method: "ledoit_wolf"  # shrinkage estimator
